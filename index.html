<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopify Pricer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <header id="app-header">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text" data-t="appName">Shopify Pricer</span>
    </div>

    <div class="header-center">
      <!-- File info shown after load -->
      <div id="file-badge" class="file-badge hidden">
        <span class="file-icon">📄</span>
        <span id="file-name-label">—</span>
        <span class="sep">·</span>
        <span id="header-count">0 products</span>
        <button class="clear-btn" id="clear-btn" title="Load new file">✕</button>
      </div>
    </div>

    <div class="header-actions">
      <!-- Export button -->
      <button class="btn-export" id="export-btn" disabled data-t="exportBtn">📤 Export CSV</button>
      <!-- Language toggle -->
      <button class="lang-toggle" id="lang-toggle" title="Switch language">
        <span class="lang-en active" id="lang-en-label">EN</span>
        <span class="lang-sep">|</span>
        <span class="lang-ar" id="lang-ar-label">ع</span>
      </button>
    </div>
  </header>

  <!-- ══ MAIN LAYOUT ════════════════════════════════════════ -->
  <div id="app-body">

    <!-- ── CENTER: Upload / Table ─────────────────────────── -->
    <main id="main-area">

      <!-- UPLOAD STATE -->
      <div id="upload-view">
        <div class="drop-zone" id="drop-zone">
          <div class="drop-glow"></div>
          <div class="drop-inner">
            <div class="drop-icon">🗂️</div>
            <h2 class="drop-title" data-t="dropTitle">Drop your Shopify CSV here</h2>
            <p class="drop-sub" data-t="dropSub">or click to browse — supports all shopify_import_*.csv files</p>
            <button class="btn-primary" id="browse-btn" data-t="browseBtn">Browse File</button>
            <input type="file" id="file-input" accept=".csv" hidden />
          </div>
        </div>

        <div class="quick-chips">
          <span class="chip-label" data-t="quickLoad">Quick load:</span>
          <button class="chip" data-file="Dungarees" data-t-label="Dungarees">🧥 Dungarees</button>
          <button class="chip" data-file="Hats" data-t-label="Hats">🎩 Hats</button>
          <button class="chip" data-file="Sleepsuits" data-t-label="Sleepsuits">😴 Sleepsuits</button>
          <button class="chip" data-file="Socks" data-t-label="Socks">🧦 Socks</button>
          <button class="chip" data-file="blankets" data-t-label="Blankets">🛏️ Blankets</button>
          <button class="chip" data-file="sets" data-t-label="Sets">👶 Sets</button>
          <button class="chip" data-file="swimsuits" data-t-label="Swimsuits">🩱 Swimsuits</button>
          <button class="chip" data-file="all_products" data-t-label="All">📦 All</button>
        </div>
      </div>

      <!-- TABLE STATE -->
      <div id="table-view" class="hidden">
        <!-- Search bar above table -->
        <div class="table-bar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" data-t-placeholder="searchPlaceholder"
              placeholder="Search products…" />
          </div>
          <select id="filter-vendor" class="vendor-select">
            <option value="" data-t="allVendors">All Vendors</option>
          </select>
          <div class="table-stats">
            <span id="stat-count" class="stat-pill">—</span>
            <span id="stat-avg" class="stat-pill accent">—</span>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrap" id="table-wrap">
          <table id="product-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- ── RIGHT PANEL: Settings ──────────────────────────── -->
    <aside id="right-panel">

      <!-- ① Currency -->
      <div class="panel-section">
        <div class="section-title">
          <span>💱</span> <span data-t="currencyTitle">Currency</span>
          <span class="rate-pill" id="rate-pill">—</span>
        </div>

        <div class="field">
          <label data-t="targetCurrencyLabel">Target Currency</label>
          <select id="target-currency" class="field-input">
            <option value="USD">USD — US Dollar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="GBP">GBP — British Pound</option>
            <option value="SAR">SAR — Saudi Riyal</option>
            <option value="KWD">KWD — Kuwaiti Dinar</option>
            <option value="OMR">OMR — Omani Rial</option>
            <option value="BHD">BHD — Bahraini Dinar</option>
            <option value="QAR">QAR — Qatari Riyal</option>
            <option value="EGP">EGP — Egyptian Pound</option>
            <option value="JOD">JOD — Jordanian Dinar</option>
            <option value="AED">AED — Keep in AED</option>
          </select>
        </div>

        <div class="field">
          <label data-t="rateLabel">Exchange Rate <small>(1 AED = ?)</small></label>
          <input type="number" id="exchange-rate" class="field-input" value="0.2722" step="0.0001" min="0.0001" />
        </div>
      </div>

      <!-- ② Duties -->
      <div class="panel-section">
        <div class="section-title">
          <span>🛃</span> <span data-t="dutiesTitle">Import & Customs</span>
        </div>

        <div class="field">
          <label data-t="customsLabel">Customs Fee <small>(%)</small></label>
          <input type="number" id="customs-rate" class="field-input" value="5" step="0.5" min="0" max="100" />
        </div>

        <div class="field">
          <label data-t="importLabel">Import / Shipping <small>(%)</small></label>
          <input type="number" id="import-rate" class="field-input" value="10" step="0.5" min="0" max="100" />
        </div>

        <div class="field">
          <label data-t="vatLabel">VAT / Local Tax <small>(%)</small></label>
          <input type="number" id="vat-rate" class="field-input" value="0" step="0.5" min="0" max="100" />
        </div>
      </div>

      <!-- ③ Profit -->
      <div class="panel-section">
        <div class="section-title">
          <span>💰</span> <span data-t="profitTitle">Profit Margin</span>
        </div>

        <div class="field">
          <label data-t="marginLabel">Margin <small>(%)</small></label>
          <input type="number" id="profit-margin" class="field-input highlight" value="35" step="0.5" min="0" />
        </div>

        <div class="field">
          <label data-t="roundingLabel">Price Rounding</label>
          <select id="rounding-mode" class="field-input">
            <option value="none" data-t="roundNone">No rounding</option>
            <option value="0.99" selected data-t="round99">Round up to .99</option>
            <option value="0.5" data-t="round50">To .00 or .50</option>
            <option value="1" data-t="round1">Nearest whole number</option>
            <option value="5" data-t="round5">Nearest 5</option>
          </select>
        </div>

        <div class="field">
          <label data-t="minPriceLabel">Minimum Price</label>
          <input type="number" id="min-price" class="field-input" value="0" step="1" min="0" />
        </div>
      </div>

      <!-- ④ Compare-at -->
      <div class="panel-section">
        <div class="section-title">
          <span>🏷️</span> <span data-t="compareTitle">Discount Price</span>
          <label class="toggle-label">
            <input type="checkbox" id="compare-at-enabled" />
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="field hidden" id="compare-at-field">
          <label data-t="compareMarkupLabel">Markup above sale <small>(%)</small></label>
          <input type="number" id="compare-at-markup" class="field-input" value="20" step="0.5" min="0" />
        </div>
      </div>

      <!-- ⑤ Price preview (mini, not a section header calculator) -->
      <div class="panel-section preview-section">
        <div class="section-title">
          <span>🔢</span> <span data-t="previewTitle">Example: 112 AED →</span>
        </div>
        <div class="preview-grid">
          <span data-t="previewFinal">Final price</span><span id="pv-final" class="pv-val green">—</span>
          <span data-t="previewCompare">After Discount</span><span id="pv-compare" class="pv-val muted">—</span>
        </div>
      </div>

      <!-- Export options (compact) -->
      <div class="panel-section">
        <div class="section-title">
          <span>⚙️</span> <span data-t="exportTitle">Export Options</span>
        </div>
        <div class="field">
          <label data-t="exportStatusLabel">Product Status</label>
          <select id="export-status" class="field-input">
            <option value="keep" data-t="keepStatus">Keep original</option>
            <option value="active" data-t="activeStatus">Force Active</option>
            <option value="draft" data-t="draftStatus">Force Draft</option>
          </select>
        </div>
      </div>

    </aside>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>

</html>
